version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/node:22.22
    steps:
      - checkout
      - run:
          name: Run tests
          command: npm test
workflows:
  version: 2
  build-deploy:
    jobs:
     - test
     - lucos/build:
        platform: "linux/amd64,linux/arm64"
        serial-group: << pipeline.project.slug >>/build/<< pipeline.git.branch >>
     - lucos/deploy-salvare:
        serial-group: deploy-salvare
        requires:
          - test
          - lucos/build
        filters:
          branches:
            only:
              - main
     - lucos/deploy-xwing:
        serial-group: deploy-xwing
        requires:
          - test
          - lucos/build
        filters:
          branches:
            only:
              - main
